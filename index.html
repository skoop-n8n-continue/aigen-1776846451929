<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="./manifest.json">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Signage - Weather</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="css/styles.css">

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

  <!-- Lahore Panel -->
  <main id="lahore-panel" class="panel">
    <!-- Skeleton State -->
    <div class="skeleton-wrapper" style="display: flex; flex-direction: column; align-items: center;">
      <div class="skeleton skeleton-text"></div>
      <div style="display: flex; gap: 32px; align-items: center;">
        <div class="skeleton skeleton-temp"></div>
        <div class="skeleton skeleton-icon"></div>
      </div>
      <div class="skeleton skeleton-cond"></div>
      <div style="display: flex; gap: 48px;">
        <div class="skeleton skeleton-meta"></div>
        <div class="skeleton skeleton-meta"></div>
      </div>
    </div>

    <!-- Data State -->
    <div class="data-container" style="display: none;">
      <h1 class="city-name">Lahore</h1>

      <div class="weather-core">
        <div class="temp-container">
          <span class="temperature">--</span>
          <span class="unit">°C</span>
        </div>
        <div class="icon-wrapper">
          <i data-lucide="sun" class="icon"></i>
        </div>
      </div>

      <div class="condition">--</div>

      <div class="meta-data">
        <div class="meta-item">
          <span class="meta-label">Wind</span>
          <span class="wind-val">-- km/h</span>
        </div>
        <div class="meta-item">
          <span class="meta-label">Humidity</span>
          <span class="hum-val">-- %</span>
        </div>
      </div>

      <div class="last-updated">Last updated: --:--</div>
    </div>
  </main>

  <!-- Karachi Panel -->
  <main id="karachi-panel" class="panel">
    <!-- Skeleton State -->
    <div class="skeleton-wrapper" style="display: flex; flex-direction: column; align-items: center;">
      <div class="skeleton skeleton-text"></div>
      <div style="display: flex; gap: 32px; align-items: center;">
        <div class="skeleton skeleton-temp"></div>
        <div class="skeleton skeleton-icon"></div>
      </div>
      <div class="skeleton skeleton-cond"></div>
      <div style="display: flex; gap: 48px;">
        <div class="skeleton skeleton-meta"></div>
        <div class="skeleton skeleton-meta"></div>
      </div>
    </div>

    <!-- Data State -->
    <div class="data-container" style="display: none;">
      <h1 class="city-name">Karachi</h1>

      <div class="weather-core">
        <div class="temp-container">
          <span class="temperature">--</span>
          <span class="unit">°C</span>
        </div>
        <div class="icon-wrapper">
          <i data-lucide="sun" class="icon"></i>
        </div>
      </div>

      <div class="condition">--</div>

      <div class="meta-data">
        <div class="meta-item">
          <span class="meta-label">Wind</span>
          <span class="wind-val">-- km/h</span>
        </div>
        <div class="meta-item">
          <span class="meta-label">Humidity</span>
          <span class="hum-val">-- %</span>
        </div>
      </div>

      <div class="last-updated">Last updated: --:--</div>
    </div>
  </main>

  <!-- JS -->
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('./sw.js')
          .then(function (reg) { console.log('[PWA] SW registered:', reg.scope); })
          .catch(function (err) { console.warn('[PWA] SW registration failed:', err); });
      });
    }
  </script>
</body>
</html>
